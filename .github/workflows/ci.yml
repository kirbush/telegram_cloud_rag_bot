name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test lightweight runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e .

      - name: Run tests
        env:
          BOT_TOKEN: "123456:test-token"
          NOTEBOOKLM_ADMIN_PASSWORD: "test-password"
          NOTEBOOKLM_RUNTIME_STATE_PATH: ".state/test-runtime-state.json"
        run: pytest -q

      - name: Validate compose file
        run: docker compose -f docker-compose.vps.yml config >/tmp/docker-compose.vps.config.yml

      - name: Check public cleanup gates
        shell: bash
        run: |
          set -euo pipefail

          test ! -e app/ingest
          test ! -e app/workers
          test ! -e app/db
          test ! -e app/bootstrap
          test ! -e app/llm/openrouter_client.py
          test ! -e app/services/history_import.py
          test ! -e docker-compose.yml
          test ! -e docker-compose.dev.yml

          ! git grep -nE 'HistoryImportService|is_notebooklm_vps_lightweight_mode' -- app
          ! git grep -nE 'sqlalchemy|asyncpg|alembic|fastembed|pymorphy|celery' -- pyproject.toml
          ! git grep -nE 'history_import|bootstrap\.importer|openrouter_client' -- tests
          ! git grep -nE 'TODO|FIXME|XXX|# removed|# deprecated|# kept for backwards compat' -- app
