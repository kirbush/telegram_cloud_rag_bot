# tgctxbot nginx skeleton for the VPS lightweight NotebookLM runtime.
#
# Public vhost:
# - serves only /health/*
# - serves only /api/public/notebooklm/*
# - returns 404 for everything else
#
# Admin vhost:
# - exposes /admin/notebooklm behind an internal hostname and client cert auth
# - keeps the admin surface off the public listener

upstream tgctxbot_api {
    server 127.0.0.1:8010;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 443 ssl http2;
    server_name tgctxbot.example.com;

    ssl_certificate /etc/letsencrypt/live/tgctxbot.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tgctxbot.example.com/privkey.pem;

    location ^~ /health/ {
        proxy_pass http://tgctxbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/public/notebooklm/ {
        proxy_pass http://tgctxbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /auth-session/ {
        proxy_pass http://tgctxbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/public/notebooklm/windows-helper/install.ps1.sha256 {
        proxy_pass http://tgctxbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.tgctxbot.example.com;

    ssl_certificate /etc/letsencrypt/live/admin.tgctxbot.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.tgctxbot.example.com/privkey.pem;
    ssl_client_certificate /etc/nginx/tgctxbot/admin-ca.pem;
    ssl_verify_client on;

    location ^~ /admin/notebooklm {
        proxy_pass http://tgctxbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/admin/notebooklm/ {
        proxy_pass http://tgctxbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        return 404;
    }
}
